<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교육운영팀 발표 순서 룰렛</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f5;
      --text-muted: rgba(240,240,245,0.45);
      --accent: #7f77dd;
      --accent2: #1d9e75;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    header p {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      width: 100%;
      max-width: 520px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder { color: var(--text-muted); }
    input[type="text"]:focus { border-color: var(--accent); }

    button {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 10px 18px;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) { opacity: 0.88; }
    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    button.outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    button.outline:hover:not(:disabled) { border-color: rgba(255,255,255,0.2); color: var(--text); }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 0.8rem;
      padding: 4px 12px;
    }

    .chip.done {
      text-decoration: line-through;
      opacity: 0.45;
    }

    .canvas-wrap {
      display: flex;
      justify-content: center;
      margin: 2rem 0 1.5rem;
      position: relative;
    }

    canvas {
      border-radius: 50%;
      box-shadow: 0 0 60px rgba(127,119,221,0.15);
    }

    .result-area {
      text-align: center;
      min-height: 56px;
      margin-bottom: 1.25rem;
    }

    .result-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .result-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .spin-btn {
      font-size: 1rem;
      padding: 13px 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #534ab7);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1rem 0;
    }

    .section-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    @keyframes pop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎡 교육운영팀 발표 순서 룰렛</h1>
  <p>이름을 입력하고 룰렛을 돌려 발표자를 선정하세요</p>
</header>

<div class="card">
  <div class="input-row">
    <input type="text" id="nameInput" placeholder="김철수, 이영희, 박민준 …" />
    <button onclick="setMembers()">설정</button>
  </div>
  <div class="chips" id="membersRow"></div>
</div>

<div class="canvas-wrap">
  <canvas id="roulette" width="340" height="340"></canvas>
</div>

<div class="result-area" id="resultBox"></div>

<div class="btn-row" id="mainBtns">
  <button class="spin-btn" onclick="spin()" id="spinBtn" disabled>돌리기</button>
  <button class="outline" onclick="resetAll()" id="resetBtn" style="display:none">처음부터</button>
</div>

<div id="doneSection" style="display:none; margin-top:1.5rem; width:100%; max-width:520px;">
  <div class="card">
    <div class="section-label">발표 완료</div>
    <div class="chips" id="doneRow"></div>
  </div>
</div>

<script>
const COLORS = [
  '#7f77dd','#1d9e75','#d85a30','#378add','#d4537e',
  '#ba7517','#639922','#985ab0','#3a8f8f','#c45c2b'
];

let members = [], done = [], spinning = false;
let currentAngle = 0, selectedMember = null;

const canvas = document.getElementById('roulette');
const ctx = canvas.getContext('2d');

function setMembers() {
  const val = document.getElementById('nameInput').value;
  const names = val.split(',').map(s => s.trim()).filter(Boolean);
  if (names.length < 2) { alert('최소 2명 이상 입력해주세요.'); return; }
  members = names; done = []; currentAngle = 0; selectedMember = null;
  document.getElementById('doneSection').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('resultBox').innerHTML = '';
  renderChips(); renderDone(); drawWheel();
  document.getElementById('spinBtn').disabled = false;
}

function renderChips() {
  document.getElementById('membersRow').innerHTML =
    members.map(m => `<span class="chip">${m}</span>`).join('');
}

function renderDone() {
  document.getElementById('doneRow').innerHTML =
    done.map(m => `<span class="chip done">${m}</span>`).join('');
  document.getElementById('doneSection').style.display = done.length ? 'block' : 'none';
}

function drawWheel(highlightIdx = -1) {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2, r = W / 2 - 8;
  ctx.clearRect(0, 0, W, H);

  if (!members.length) {
    ctx.fillStyle = '#22222e';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(240,240,245,0.3)';
    ctx.font = '14px Noto Sans KR, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('이름을 입력하세요', cx, cy);
    drawPointer(cx); return;
  }

  const slice = (Math.PI * 2) / members.length;

  members.forEach((name, i) => {
    const start = currentAngle + i * slice;
    const end = start + slice;
    const color = COLORS[i % COLORS.length];
    const isHL = i === highlightIdx;

    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end); ctx.closePath();
    ctx.fillStyle = isHL ? lighten(color) : color;
    ctx.fill();
    ctx.strokeStyle = '#0f0f13'; ctx.lineWidth = 2; ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy); ctx.rotate(start + slice / 2);
    const labelR = r * 0.60;
    ctx.translate(labelR, 0);
    ctx.fillStyle = '#fff';
    const fs = members.length > 7 ? 11 : 13;
    ctx.font = `500 ${fs}px Noto Sans KR, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    wrapText(ctx, name, 0, 0, r * 0.52, fs + 4);
    ctx.restore();
  });

  ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.fillStyle = '#0f0f13'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1.5; ctx.stroke();

  drawPointer(cx);
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const estW = text.length * parseInt(ctx.font) * 0.6;
  if (estW <= maxW) { ctx.fillText(text, x, y); return; }
  const mid = Math.ceil(text.length / 2);
  ctx.fillText(text.slice(0, mid), x, y - lineH / 2);
  ctx.fillText(text.slice(mid), x, y + lineH / 2);
}

function drawPointer(cx) {
  const py = 8;
  ctx.beginPath();
  ctx.moveTo(cx - 11, py); ctx.lineTo(cx + 11, py); ctx.lineTo(cx, py + 24);
  ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5; ctx.stroke();
}

function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+70)},${Math.min(255,g+70)},${Math.min(255,b+70)})`;
}

function spin() {
  if (spinning || !members.length) return;
  spinning = true; selectedMember = null;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultBox').innerHTML = '<div class="result-sub">돌리는 중...</div>';

  const sliceAngle = (Math.PI * 2) / members.length;
  const winIdx = Math.floor(Math.random() * members.length);
  const spins = 5 + Math.random() * 4;
  const totalRot = Math.PI * 2 * spins;
  const pointerAngle = -Math.PI / 2;
  const targetCenter = winIdx * sliceAngle + sliceAngle / 2;
  const targetAngle = pointerAngle - targetCenter - currentAngle;
  const finalRot = totalRot + ((targetAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);

  const startAngle = currentAngle;
  const duration = 3500 + Math.random() * 1000;
  const startTime = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function animate(now) {
    const t = Math.min((now - startTime) / duration, 1);
    currentAngle = startAngle + finalRot * easeOut(t);
    drawWheel(t >= 1 ? winIdx : -1);
    if (t < 1) { requestAnimationFrame(animate); }
    else {
      spinning = false;
      selectedMember = members[winIdx];
      showResult(selectedMember);
    }
  }
  requestAnimationFrame(animate);
}

function showResult(name) {
  document.getElementById('resultBox').innerHTML = `
    <div class="result-sub">발표자가 선정되었습니다!</div>
    <div class="result-name">🎉 ${name}</div>
    <div class="result-actions">
      <button onclick="confirmPresented()">발표 완료</button>
      <button class="outline" onclick="cancelResult()">다시 돌리기</button>
    </div>
  `;
  document.getElementById('resetBtn').style.display = 'inline-block';
}

function confirmPresented() {
  if (!selectedMember) return;
  done.push(selectedMember);
  members = members.filter(m => m !== selectedMember);
  selectedMember = null; currentAngle = 0;
  renderChips(); renderDone();
  if (!members.length) {
    document.getElementById('resultBox').innerHTML = '<div class="result-name">🏁 모든 발표가 끝났습니다!</div>';
    document.getElementById('spinBtn').disabled = true;
  } else {
    document.getElementById('resultBox').innerHTML = '<div class="result-sub">다음 발표자를 선정하려면 돌리기를 누르세요.</div>';
    document.getElementById('spinBtn').disabled = false;
  }
  drawWheel();
}

function cancelResult() {
  selectedMember = null; currentAngle = 0;
  document.getElementById('resultBox').innerHTML = '';
  document.getElementById('spinBtn').disabled = false;
  drawWheel();
}

function resetAll() {
  const val = document.getElementById('nameInput').value;
  const names = val.split(',').map(s => s.trim()).filter(Boolean);
  if (names.length < 2) { alert('입력창에 이름이 있어야 초기화할 수 있습니다.'); return; }
  members = names; done = []; currentAngle = 0; selectedMember = null;
  document.getElementById('resultBox').innerHTML = '';
  document.getElementById('resetBtn').style.display = 'none';
  renderChips(); renderDone(); drawWheel();
  document.getElementById('spinBtn').disabled = false;
}

drawWheel();
</script>
</body>
</html>
